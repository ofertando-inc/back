name: Deploy staging

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  promote:
    name: Promote dev image to staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Re-tag dev image as staging
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/ofertando-inc/back:staging \
            --tag ghcr.io/ofertando-inc/back:staging-${{ github.ref_name }} \
            ghcr.io/ofertando-inc/back:dev-${{ github.sha }}

      - name: Trigger Dokploy redeploy
        run: curl -fsS -X POST "${{ secrets.DOKPLOY_STAGING_WEBHOOK_URL }}"
