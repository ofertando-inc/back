name: Release to staging

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/ofertando-inc/back

jobs:
  release:
    name: Build versioned image and update staging tag
    runs-on: ubuntu-latest
    environment: staging
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')

    env:
      RELEASE_TAG: ${{ github.event.workflow_run.head_branch }}
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Validate release tag
        run: |
          set -euo pipefail

          if ! printf '%s' "${RELEASE_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9a-z.-]+)?$'; then
            echo "Staging tags must use semantic versioning, for example v0.1.1 or v0.1.1-rc.1."
            exit 1
          fi

          git fetch origin main:refs/remotes/origin/main

          if ! git merge-base --is-ancestor "${RELEASE_SHA}" origin/main; then
            echo "Release tag ${RELEASE_TAG} must point to a commit contained in main."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push versioned image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify versioned image exists
        run: docker buildx imagetools inspect "${IMAGE_NAME}:${RELEASE_TAG}"

      - name: Update stable staging tag from versioned image
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:staging" \
            "${IMAGE_NAME}:${RELEASE_TAG}"

      - name: Trigger Dokploy staging redeploy
        run: |
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            --data "{\"image\":\"${IMAGE_NAME}:staging\",\"release\":\"${RELEASE_TAG}\"}" \
            "${{ secrets.DOKPLOY_STAGING_WEBHOOK_URL }}"
