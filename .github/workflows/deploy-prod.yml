name: Deploy prod

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy to production (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  promote:
    name: Promote dev image to prod
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository at tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 1

      - name: Resolve commit SHA from tag
        id: sha
        run: echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Re-tag dev image as prod
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/ofertando-inc/back:prod \
            --tag ghcr.io/ofertando-inc/back:prod-${{ inputs.tag }} \
            ghcr.io/ofertando-inc/back:dev-${{ steps.sha.outputs.value }}

      - name: Trigger Dokploy redeploy
        run: curl -fsS -X POST "${{ secrets.DOKPLOY_PROD_WEBHOOK_URL }}"
