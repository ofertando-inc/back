name: Deploy dev image

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - dev

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/ofertando-inc/back

jobs:
  deploy:
    name: Build dev image and trigger Dokploy
    runs-on: ubuntu-latest
    environment: dev
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:dev
            ${{ env.IMAGE_NAME }}:dev-${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy redeploy
        run: |
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            --data "{\"image\":\"${IMAGE_NAME}:dev\",\"commit\":\"${{ github.event.workflow_run.head_sha }}\"}" \
            "${{ secrets.DOKPLOY_DEV_WEBHOOK_URL }}"
