name: Deploy dev

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - dev

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build, push and trigger Dokploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository at upstream commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: |
            ghcr.io/ofertando-inc/back:dev
            ghcr.io/ofertando-inc/back:dev-${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy redeploy
        run: curl -fsS -X POST "${{ secrets.DOKPLOY_DEV_WEBHOOK_URL }}"
