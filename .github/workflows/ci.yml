name: CI

on:
  push:
    branches:
      - dev
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  ci:
    name: Validate Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ofertando_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ofertando_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ofertando_test?schema=public
      JWT_SECRET: test_jwt_secret
      JWT_EXPIRES_IN: 1d
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint:check

      - name: Unit tests
        run: npm run test -- --runInBand

      - name: E2E tests
        run: npm run test:e2e -- --runInBand

      - name: Build app
        run: npm run build

      - name: Build Docker image
        run: docker build .
