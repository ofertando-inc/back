services:
  back-ofertando:
    build:
      context: .
      target: development
    container_name: back-ofertando-app
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/ofertando?schema=public}
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - .:/app:Z
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - back-ofertando-network

  db:
    image: postgres:18-alpine
    container_name: back-ofertando-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ofertando}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ofertando}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - back-ofertando-network

networks:
  back-ofertando-network:
    driver: bridge

volumes:
  db-data:
