services:
  back-ofertando:
    build:
      context: .
      target: development
    container_name: back-ofertando-app
    init: true
    command: sh -c "npm install && npx prisma generate && npx prisma migrate deploy && npm run start:dev"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    volumes:
      - .:/app:Z
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - back-ofertando-network

  db:
    image: postgres:18-alpine
    container_name: back-ofertando-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ofertando}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ofertando}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - back-ofertando-network

networks:
  back-ofertando-network:
    driver: bridge

volumes:
  db-data:
